<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In &mdash; AutoCV</title>
    <meta name="description" content="Log in to your AutoCV account to access ATS scanning, resume optimization, and recruiter batch tools.">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/static/js/config.js" defer></script>
    <script src="/static/js/auth.js" defer></script>
    <script src="/static/js/animations.js" defer></script>
</head>
<body>

<!-- Nav -->
<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">
            <div class="nav-logo-mark">A</div>
            AutoCV
        </a>
        <div class="nav-links">
            <a href="/pages/pricing.html" class="nav-link">Pricing</a>
            <a href="/pages/signup.html" class="nav-link">Sign Up</a>
        </div>
    </div>
</nav>

<!-- Login Form -->
<div class="auth-page">
    <div class="auth-card animate-fade-in-up">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to continue optimizing your career</p>

        <!-- Google Login -->
        <button class="btn btn-secondary btn-full" id="google-login-btn" style="gap:10px;margin-bottom:20px;">
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
            Continue with Google
        </button>

        <div class="or-divider">or</div>

        <!-- Email/Password Login -->
        <form id="login-form" style="margin-top:20px;">
            <div class="form-group" style="margin-bottom:16px;">
                <label class="label" for="login-email">Email</label>
                <input type="email" id="login-email" class="input" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label class="label" for="login-password">Password</label>
                <input type="password" id="login-password" class="input" placeholder="Your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-submit-btn">
                Log In
            </button>
        </form>

        <div style="margin-top:24px;text-align:center;">
            <p class="text-sm text-muted">
                Don't have an account? <a href="/pages/signup.html" style="color:var(--primary);font-weight:600;">Sign up free</a>
            </p>
        </div>
    </div>

    <!-- Success Check overlay (A11) -->
    <div id="success-check" style="display:none;text-align:center;padding:48px 32px;">
        <svg width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" fill="none"
                stroke="var(--green)" stroke-width="3"
                stroke-dasharray="160" stroke-dashoffset="160"
                style="animation:checkCircle 0.5s var(--ease-out) forwards;transform-origin:center;transform:rotate(-90deg)"/>
            <polyline points="18,32 28,44 46,22" fill="none"
                stroke="var(--green)" stroke-width="3" stroke-linecap="round"
                stroke-dasharray="60" stroke-dashoffset="60"
                style="animation:checkDraw 0.35s 0.4s var(--ease-out) forwards"/>
        </svg>
        <p style="margin-top:12px;font-weight:600;color:var(--green)">Signed in successfully!</p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Google login
    document.getElementById('google-login-btn').addEventListener('click', () => {
        auth.loginWithGoogle();
    });

    // Email login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-submit-btn');
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        if (!email || !password) return toast('Please fill in all fields', 'error');

        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
            await auth.loginWithEmail(email, password);
            // Show success animation
            document.getElementById('login-form').closest('.auth-card').style.opacity = '0';
            document.getElementById('success-check').style.display = 'block';
            // Auth listener handles redirect after delay
        } catch (err) {
            btn.disabled = false;
            btn.textContent = 'Log In';
            window.shakeElement && window.shakeElement(document.querySelector('.auth-card'));
        }
    });
});
</script>

</body>
</html>
