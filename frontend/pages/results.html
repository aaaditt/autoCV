<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results &mdash; AutoCV</title>
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/static/js/config.js" defer></script>
    <script src="/static/js/auth.js" defer></script>
    <script src="/static/js/animations.js" defer></script>
</head>
<body>

<!-- Nav -->
<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">
            <div class="nav-logo-mark">A</div>
            AutoCV
        </a>
        <div class="nav-links">
            <a href="/pages/dashboard.html" class="nav-link">Dashboard</a>
            <span class="plan-badge badge badge-gray"></span>
            <div style="width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;" id="nav-avatar">U</div>
        </div>
    </div>
</nav>

<div class="container-narrow" style="padding-top:40px;padding-bottom:80px;">
    <div id="loading-results" style="text-align:center;padding:80px 0;">
        <div class="spinner" style="margin:0 auto 24px;"></div>
        <h3>Loading results...</h3>
    </div>

    <div id="results-content" class="hidden animate-fade-in-up">
        <!-- Header -->
        <div class="flex items-center justify-between mb-32">
            <div>
                <h1 id="res-title">Scan Results</h1>
                <p class="text-muted text-sm" id="res-subtitle">ATS compatibility breakdown</p>
            </div>
            <div class="flex gap-12">
                <button class="btn btn-secondary btn-sm" onclick="window.print()">
                    <span class="material-symbols-outlined" style="font-size:1rem;">print</span>
                    Print
                </button>
                <button class="btn btn-primary btn-sm hidden" id="download-btn">
                    <span class="material-symbols-outlined" style="font-size:1rem;">download</span>
                    Download PDF
                </button>
            </div>
        </div>

        <!-- Score & Keywords -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-24 mb-32">
            <div class="card" style="text-align:center;">
                <div class="score-ring-wrap">
                    <div class="score-ring score-ring-lg" id="final-score"></div>
                    <div class="score-label" id="final-score-label">ATS Score</div>
                </div>
            </div>
            <div class="card">
                <h3>Quick Stats</h3>
                <div style="margin-top:16px;display:flex;flex-direction:column;gap:12px;">
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-muted">Keywords Matched</span>
                        <span class="font-bold" id="matched-stat">0</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-muted">Keywords Missing</span>
                        <span class="font-bold" id="missing-stat" style="color:var(--red);">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI Rewrite Section (Tabs) -->
        <div id="optimize-section" class="hidden">
            <div class="tabs mb-16" data-tabs="results">
                <button class="tab active" data-target="tab-keywords">Keywords</button>
                <button class="tab" data-target="tab-comparison">AI Comparison</button>
            </div>

            <div id="tab-keywords" class="tab-content active" data-tab-content="results">
                <div class="mb-24">
                    <h4 class="mb-12">Matched Keywords</h4>
                    <div class="pill-group" id="res-matched-pills"></div>
                </div>
                <div>
                    <h4 class="mb-12">Missing Keywords</h4>
                    <div class="pill-group" id="res-missing-pills"></div>
                </div>
            </div>

            <div id="tab-comparison" class="tab-content" data-tab-content="results">
                <div class="card card-flat overflow-hidden" style="padding:0;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;background:var(--surface-3);border-bottom:1px solid var(--border);">
                        <div style="padding:12px;font-weight:600;font-size:0.875rem;">Original</div>
                        <div style="padding:12px;font-weight:600;font-size:0.875rem;border-left:1px solid var(--border);">Optimized</div>
                    </div>
                    <div id="diff-container" style="padding:16px;font-family:monospace;font-size:0.8125rem;white-space:pre-wrap;max-height:500px;overflow-y:auto;background:var(--bg);">
                        <!-- Diff will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Simple Keywords View (if no optimization) -->
        <div id="simple-keywords-section">
            <div class="mb-32">
              <h3 class="mb-12">Matched Keywords</h3>
              <div class="pill-group" id="simple-matched-pills"></div>
            </div>
            <div class="mb-32">
              <h3 class="mb-12">Missing Keywords</h3>
              <div class="pill-group" id="simple-missing-pills"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    window.addEventListener('auth:ready', async () => {
        const urlParams = new URL(window.location.href).searchParams;
        const optId = urlParams.get('id');

        if (!optId) {
            // Fallback for immediate scan check (if results passed in session/memory)
            // For now, redirect to dashboard if no ID
            if (!auth.user) {
              window.location.href = '/pages/login.html';
              return;
            }
            window.location.href = '/pages/dashboard.html';
            return;
        }

        await fetchResult(optId);
        setupTabs('results');
    });
});

async function fetchResult(id) {
    if (!auth.supabase) return;

    try {
        const { data, error } = await auth.supabase
            .from('optimizations')
            .select('*')
            .eq('optimization_id', id)
            .single();

        if (error) throw error;
        if (!data) throw new Error('Result not found');

        document.getElementById('loading-results').classList.add('hidden');
        document.getElementById('results-content').classList.remove('hidden');

        // Populate header
        document.getElementById('res-title').textContent = data.job_title || 'Resume Scan';
        document.getElementById('res-subtitle').textContent = `Filename: ${data.filename || 'Unknown'}`;

        // Score
        const score = data.optimized_score || data.original_score || 0;
        const ringEl = document.getElementById('final-score');
        ringEl.dataset.score = score;
        if (window.AutoCVAnim) {
            window.AutoCVAnim.animateRing(ringEl);
        } else {
            renderScoreRing(ringEl, score, 140);
        }

        // Keywords (if available in database)
        const matched = data.matched_keywords || [];
        const missing = data.missing_keywords || [];
        document.getElementById('matched-stat').textContent = matched.length || 0;
        document.getElementById('missing-stat').textContent = missing.length || 0;

        const renderPills = (containerId, keywords, type) => {
            const container = document.getElementById(containerId);
            if (!container) return;
            if (!keywords || keywords.length === 0) {
                container.innerHTML = '<span class="text-sm text-muted">No data</span>';
                return;
            }
            container.innerHTML = keywords.map(kw => `<span class="pill pill-${type}">${esc(kw)}</span>`).join('');
        };

        // If I have optimized text, show the comparison section
        if (data.optimized_text) {
            document.getElementById('optimize-section').classList.remove('hidden');
            document.getElementById('simple-keywords-section').classList.add('hidden');

            renderPills('res-matched-pills', matched, 'matched');
            renderPills('res-missing-pills', missing, 'missing');

            document.getElementById('diff-container').textContent = data.optimized_text;

            if (auth.isPaid) {
                document.getElementById('download-btn').classList.remove('hidden');
            }
        } else {
            document.getElementById('optimize-section').classList.add('hidden');
            document.getElementById('simple-keywords-section').classList.remove('hidden');
            renderPills('simple-matched-pills', matched, 'matched');
            renderPills('simple-missing-pills', missing, 'missing');
        }

    } catch (err) {
        toast(err.message, 'error');
        console.error(err);
    }
}

function generateDiff(oldStr, newStr) {
    // Simple placeholder for comparison, in a real app would use a diff library
    return newStr; 
}
</script>

</body>
</html>
