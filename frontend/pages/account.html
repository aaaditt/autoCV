<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings â€” AutoCV</title>
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/static/js/config.js" defer></script>
    <script src="/static/js/auth.js" defer></script>
    <script src="/static/js/animations.js" defer></script>
</head>
<body>

<!-- Nav -->
<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">
            <div class="nav-logo-mark">A</div>
            AutoCV
        </a>
        <div class="nav-links">
            <a href="/pages/dashboard.html" class="nav-link">Dashboard</a>
            <span class="plan-badge badge badge-gray"></span>
        </div>
    </div>
</nav>

<div class="container-narrow" style="padding-top:48px;padding-bottom:80px;">
    <h1 class="mb-32">Account Settings</h1>

    <div class="animate-fade-in-up">
        <!-- Profile info -->
        <div class="card mb-24">
            <h3 class="mb-16">Profile Information</h3>
            <div class="form-group mb-16">
                <label class="label">Full Name</label>
                <input type="text" id="acc-name" class="input" readonly>
            </div>
            <div class="form-group">
                <label class="label">Email Address</label>
                <input type="email" id="acc-email" class="input" readonly>
            </div>
        </div>

        <!-- Plan Status -->
        <div class="card mb-24">
            <div class="flex items-center justify-between mb-16">
                <h3>Subscription & Plan</h3>
                <span class="plan-badge badge" id="acc-plan-badge">Free</span>
            </div>
            <div style="background:var(--surface-2);border-radius:var(--r-md);padding:16px;">
                <div class="flex items-center justify-between text-sm">
                    <span class="text-muted">Account Type</span>
                    <strong id="acc-type">Student</strong>
                </div>
                <div class="divider" style="margin:12px 0;"></div>
                <div class="flex items-center justify-between text-sm">
                    <span class="text-muted">Scans Used This Week</span>
                    <strong id="acc-scans">0</strong>
                </div>
            </div>
            <div class="flex gap-12 mt-20">
                <a href="/pages/pricing.html" class="btn btn-primary btn-sm">Upgrade Plan</a>
                <button class="btn btn-secondary btn-sm" onclick="toast('Billing portal coming soon. Message support if needed.', 'info')">Manage Billing</button>
            </div>
        </div>

        <!-- Sessions / Security -->
        <div class="card mb-24">
            <h3 class="mb-16">Security</h3>
            <p class="text-sm text-muted">Manage your account access and security settings.</p>
            <div class="flex gap-12 mt-16">
              <button class="btn btn-secondary btn-sm">Change Password</button>
              <button class="btn btn-secondary btn-sm" onclick="toast('Sessions cleared.', 'success')">Log out all devices</button>
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="card" style="border-color:var(--red-light);">
            <h3 class="text-danger mb-8">Danger Zone</h3>
            <p class="text-sm text-muted">Permanently delete your account and all optimization history.</p>
            <button class="btn btn-danger mt-16" onclick="confirm('Are you sure you want to delete your account? This cannot be undone.') && toast('Request sent to support.', 'info')">
                Delete Account
            </button>
        </div>

        <!-- Logout -->
        <div class="text-center mt-48">
            <button class="btn btn-secondary" onclick="auth.logout()">
                <span class="material-symbols-outlined" style="font-size:1.125rem;">logout</span>
                Sign Out
            </button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    window.addEventListener('auth:ready', () => {
        if (!auth.user) {
            window.location.href = '/pages/login.html';
            return;
        }

        const user = auth.user;
        document.getElementById('acc-name').value = user.name || user.user_metadata?.full_name || '';
        document.getElementById('acc-email').value = user.email || '';

        const badge = document.getElementById('acc-plan-badge');
        badge.textContent = auth.plan.toUpperCase();
        if (auth.isPro) badge.classList.add('badge-pro');
        else if (auth.isPaid) badge.classList.add('badge-blue');
        else badge.classList.add('badge-gray');

        document.getElementById('acc-type').textContent = auth.isRecruiter ? 'Recruiter' : 'Student';
        document.getElementById('acc-scans').textContent = user.scans_used_this_week || 0;

        if (auth.isRecruiter) {
            document.body.classList.add('theme-recruiter');
        }
    });
});
</script>

</body>
</html>
