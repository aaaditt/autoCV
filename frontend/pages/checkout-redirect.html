<style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-smooth {
            animation: spin 0.8s linear infinite;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<style>
    /* Global Animations */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-page {
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    /* Button Hover Enhancements */
    button, a.btn, a[class*="bg-primary"], a[class*="bg-surface"] {
        transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, opacity 0.2s ease !important;
    }
    button:hover, a.btn:hover {
        transform: translateY(-2px);
    }
</style>

<body class="bg-surface-container-lowest text-on-surface font-body antialiased flex flex-col items-center justify-center min-h-screen p-6">
<!-- Top Branding Anchor -->
<header class="fixed top-12 flex flex-col items-center">
<div class="text-xl font-bold tracking-tighter text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" data-icon="description">description</span>
            ResumeAI
        </div>
</header>
<!-- Main Transition Canvas -->
<main class="max-w-[480px] w-full text-center flex flex-col items-center gap-12">
<!-- Loading Visual -->
<div class="relative w-12 h-12">
<div class="absolute inset-0 border-4 border-surface-container rounded-full"></div>
<div class="absolute inset-0 border-4 border-t-primary-container border-r-transparent border-b-transparent border-l-transparent rounded-full animate-spin-smooth"></div>
</div>
<!-- Narrative Content -->
<div class="flex flex-col gap-3">
<h1 class="text-2xl font-semibold tracking-tight text-on-surface">
                Taking you to secure checkout...
            </h1>
<p class="text-[15px] text-on-secondary-container max-w-[320px] mx-auto leading-relaxed">
                You'll be redirected to Stripe. Your resume data stays safe.
            </p>
</div>
<!-- Trust Tier (Tonal Layering) -->
<div class="flex flex-wrap justify-center items-center gap-x-6 gap-y-4 pt-4">
<div class="flex items-center gap-2 text-on-secondary-container">
<span class="material-symbols-outlined text-[18px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-xs font-medium tracking-wide uppercase opacity-80">256-bit SSL</span>
</div>
<div class="flex items-center gap-2 text-on-secondary-container">
<span class="material-symbols-outlined text-[18px]" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-xs font-medium tracking-wide uppercase opacity-80">Stripe Secured</span>
</div>
<div class="flex items-center gap-2 text-on-secondary-container">
<span class="material-symbols-outlined text-[18px]" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-xs font-medium tracking-wide uppercase opacity-80">Instant delivery</span>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-12">
<a class="flex items-center gap-2 text-sm text-on-secondary-container hover:text-on-surface transition-colors duration-200" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="arrow_back">arrow_back</span>
            Go back
        </a>
</footer>

<script src="../static/js/config.js"></script>
<script src="../static/js/app.js"></script>

<script>
    // Reveal animations on scroll
    document.addEventListener("DOMContentLoaded", () => {
        document.body.classList.add('animate-page');
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('section, .animate-on-scroll').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(15px)';
            el.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
            observer.observe(el);
        });
    });
</script>

</body>
</html>
