<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .editorial-shadow { box-shadow: 0 10px 40px rgba(29, 29, 31, 0.06); }
        .ghost-border { outline: 1px solid rgba(193, 198, 214, 0.15); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-page {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        button, a.btn, a[class*="bg-primary"], a[class*="bg-surface"] {
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, opacity 0.2s ease !important;
        }
        button:hover, a.btn:hover {
            transform: translateY(-2px);
        }

        /* Toast Styles (Sync with global.css) */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1a1b1f; color: #fff; padding: 12px 20px; border-radius: 1rem;
            font-size: 14px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); max-width: 320px;
            animation: slideUp 0.2s ease;
        }
        .toast.success { background: #34C759; }
        .toast.error   { background: #ba1a1a; }
        @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Loading Spinner */
        .spinner {
            width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.7s linear infinite; display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

<form class="flex flex-col gap-5">

<label class="text-xs font-semibold text-on-secondary-container px-1" for="email">EMAIL ADDRESS</label>
<input class="w-full h-12 px-4 bg-surface-container-high border-b-2 border-transparent focus:border-primary-container focus:ring-0 rounded-t-DEFAULT transition-all duration-200 outline-none placeholder:text-outline/50" id="email" placeholder="alex@example.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold text-on-secondary-container px-1" for="password">PASSWORD</label>

</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold text-on-secondary-container px-1" for="confirm-password">CONFIRM PASSWORD</label>
<input class="w-full h-12 px-4 bg-surface-container-high border-b-2 border-transparent focus:border-primary-container focus:ring-0 rounded-t-DEFAULT transition-all duration-200 outline-none placeholder:text-outline/50" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
<button id="signup-btn" class="w-full h-12 bg-primary-container text-white font-semibold rounded-full hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-primary-container/20 mt-2 flex items-center justify-center gap-2" type="button" onclick="signUpWithEmail()">
                    <span id="btn-text">Create Account</span>
                    <div id="btn-spinner" class="spinner hidden"></div>
                </button>
</form>

<script>
    async function signUpWithEmail() {
        const btn = document.getElementById('signup-btn');
        const text = document.getElementById('btn-text');
        const spinner = document.getElementById('btn-spinner');
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        if (!email || !password || !confirmPassword) {
            return toast("All fields are required", "error");
        }
        
        if (password !== confirmPassword) {
            return toast("Passwords do not match", "error");
        }
        
        if (password.length < 6) {
            return toast("Password must be at least 6 characters", "error");
        }

        // Set Loading State
        btn.disabled = true;
        text.style.opacity = '0.7';
        spinner.classList.remove('hidden');

        try {
            console.log("Attempting signup for:", email);
            const data = await auth.signupWithEmail(email, password);
            console.log("Signup Response:", data);
            
            // Check if user is auto-logged in (session is present and confirmation is OFF)
            if (data && data.session) {
                toast("Account created! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else if (data && data.user) {
                // confirmation is ON - data.session is null but data.user is present
                toast("Verification email sent! Please check your inbox.", "success");
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 4000);
            } else {
                // Might happen if rate limited or other silent fail
                toast("Check your email for the confirmation link to proceed.", "success");
            }
        } catch(err) {
            console.error("Signup failed:", err);
            // Already handled by toast in auth.signupWithEmail, but let's be double sure
            if (typeof toast !== 'undefined') {
                toast(err.message, 'error');
            } else {
                alert("Error: " + err.message);
            }
        } finally {
            // Reset Loading State (though if redirecting it doesn't matter much)
            setTimeout(() => {
                btn.disabled = false;
                text.style.opacity = '1';
                spinner.classList.add('hidden');
            }, 2000);
        }
    }
</script>
