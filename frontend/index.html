<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Welcome to AutoCV</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0059b5",
                        "primary-container": "#0071e3",
                        background: "#faf8fe",
                        surface: "#ffffff",
                        "on-surface": "#1a1b1f",
                        "on-secondary-container": "#636264",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #faf8fe;
            color: #1a1b1f;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Subtle Gradient Glow for Light Mode */
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 89, 181, 0.05) 0%, rgba(250, 248, 254, 0) 70%);
            filter: blur(80px);
            z-index: -1;
            animation: pulse 10s infinite alternate cubic-bezier(0.445, 0.05, 0.55, 0.95);
        }

        @keyframes pulse {
            from { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Typography */
        .title-reveal {
            background: linear-gradient(to bottom, #1a1b1f 60%, rgba(26, 27, 31, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-reveal {
            animation: fadeInUp 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* Elevation */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 89, 181, 0.08);
            border-radius: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        }

        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.02;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="antialiased flex min-h-screen items-center justify-center p-6 select-none transition-colors duration-700">
    <div class="grain"></div>
    <div class="glow-bg"></div>

    <div class="max-w-4xl w-full text-center z-10">
        <!-- Logo Badge -->
        <div class="mb-12 opacity-0 animate-reveal">
            <div class="inline-flex items-center gap-2 px-6 py-2 glass-card text-xs font-bold tracking-[0.2em] uppercase text-primary">
                <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
                Live Platform
            </div>
        </div>

        <!-- Headline -->
        <h1 class="text-[clamp(3.5rem,10vw,6rem)] font-[900] tracking-[-0.05em] leading-[0.9] mb-8 opacity-0 animate-reveal delay-1 title-reveal">
            Welcome to <br/>
            Auto<span class="text-primary italic">CV</span>
        </h1>

        <!-- Tagline -->
        <p class="text-lg md:text-[22px] text-slate-500 font-medium tracking-tight mb-16 max-w-2xl mx-auto opacity-0 animate-reveal delay-2 leading-relaxed">
            The AI-powered architect for your professional future. <br class="hidden md:block"/>
            Optimize, elevate, and land the interview with data-driven precision.
        </p>

        <!-- Button Section -->
        <div class="opacity-0 animate-reveal delay-3">
            <button onclick="navigateToMain()" class="group relative px-12 py-5 bg-primary text-white font-extrabold text-lg rounded-full overflow-hidden hover:scale-[1.05] hover:shadow-2xl hover:shadow-primary/20 active:scale-[0.98] transition-all duration-300">
                <span class="relative z-10 flex items-center gap-2">
                    Get Started
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </span>
                <!-- Hover Glow Effect -->
                <div class="absolute inset-0 bg-primary-container opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
            </button>
            <p class="mt-8 text-xs text-slate-400 uppercase tracking-widest font-bold">Trusted by 10,000+ Students & Professionals</p>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="fixed bottom-12 left-1/2 -translate-x-1/2 opacity-20 text-[10px] uppercase tracking-[0.4em] font-black pointer-events-none text-slate-900">
        Built with Precision since 2024
    </div>

    <script>
        function navigateToMain() {
            // Smooth transition effect
            document.body.style.opacity = '0';
            document.body.style.transform = 'scale(0.98)';
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 600);
        }
    </script>
</body>
</html>
