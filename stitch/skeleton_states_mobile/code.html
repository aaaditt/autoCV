<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "secondary-container": "#e2dfe1",
                    "surface-dim": "#dbd9df",
                    "primary-container": "#0071e3",
                    "primary": "#0059b5",
                    "error-container": "#ffdad6",

                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#00531c",
                    "surface-container-highest": "#e3e2e7",
                    "outline-variant": "#c1c6d6",

                    "error": "#ba1a1a",

            "borderRadius": {
                    "DEFAULT": "1rem",

            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]

        },
      }

<style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
            background-size: 200% 100%;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-24">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-zinc-900/70 backdrop-blur-xl shadow-[0_10px_40px_rgba(29,29,31,0.06)] flex justify-between items-center px-6 h-16 font-['Inter'] antialiased tracking-tight">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-zinc-900 dark:text-zinc-50">menu</span>
<span class="text-xl font-bold tracking-tighter text-zinc-900 dark:text-zinc-50">ResumeAI</span>
</div>
<div class="w-8 h-8 rounded-full skeleton"></div>
</header>
<main class="pt-24 px-6 max-w-lg mx-auto space-y-12">
<!-- Optimizer Analysis Panel Skeleton -->
<section class="space-y-6">
<div class="h-8 w-48 skeleton rounded-lg"></div>
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] space-y-8">
<!-- Score Circle Skeleton -->
<div class="flex justify-center">
<div class="w-32 h-32 rounded-full skeleton"></div>
</div>
<!-- Detailed Metrics Skeleton -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<div class="h-4 w-16 skeleton rounded"></div>
<div class="h-6 w-full skeleton rounded"></div>
</div>
<div class="space-y-2">
<div class="h-4 w-16 skeleton rounded"></div>
<div class="h-6 w-full skeleton rounded"></div>
</div>
</div>
<!-- Analysis Points -->
<div class="space-y-4">
<div class="flex items-start gap-3">
<div class="w-5 h-5 rounded-full skeleton flex-shrink-0"></div>
<div class="flex-1 space-y-2 pt-1">
<div class="h-3 w-full skeleton rounded"></div>
<div class="h-3 w-4/5 skeleton rounded"></div>
</div>
</div>
<div class="flex items-start gap-3">
<div class="w-5 h-5 rounded-full skeleton flex-shrink-0"></div>
<div class="flex-1 space-y-2 pt-1">
<div class="h-3 w-full skeleton rounded"></div>
<div class="h-3 w-2/3 skeleton rounded"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Dashboard History Cards Skeleton -->
<section class="space-y-6">
<div class="flex justify-between items-center">
<div class="h-6 w-32 skeleton rounded-lg"></div>
<div class="h-4 w-16 skeleton rounded-lg"></div>
</div>
<div class="space-y-4">
<!-- Card 1 -->
<div class="bg-surface-container-low rounded-xl p-5 flex gap-4 items-center">
<div class="w-12 h-12 rounded-lg skeleton flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-3/4 skeleton rounded"></div>
<div class="h-3 w-1/2 skeleton rounded opacity-60"></div>
</div>
<div class="w-6 h-6 skeleton rounded-full"></div>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-low rounded-xl p-5 flex gap-4 items-center">
<div class="w-12 h-12 rounded-lg skeleton flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-2/3 skeleton rounded"></div>
<div class="h-3 w-1/3 skeleton rounded opacity-60"></div>
</div>
<div class="w-6 h-6 skeleton rounded-full"></div>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-low rounded-xl p-5 flex gap-4 items-center">
<div class="w-12 h-12 rounded-lg skeleton flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-4/5 skeleton rounded"></div>
<div class="h-3 w-2/5 skeleton rounded opacity-60"></div>
</div>
<div class="w-6 h-6 skeleton rounded-full"></div>
</div>
</div>
</section>
<!-- Asymmetric Detail State -->
<section class="bg-primary/5 rounded-xl p-6 border border-primary/10">
<div class="flex gap-4">
<div class="w-2 h-16 bg-primary/20 rounded-full"></div>
<div class="space-y-3 flex-1">
<div class="h-4 w-1/2 skeleton rounded"></div>
<div class="h-3 w-full skeleton rounded"></div>
<div class="h-3 w-full skeleton rounded"></div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-2 pb-8 bg-white/70 dark:bg-zinc-900/70 backdrop-blur-xl border-t border-zinc-200/15 dark:border-zinc-800/15 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-50">
<!-- Dashboard (Active Mockup State) -->
<div class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 bg-blue-50/50 dark:bg-blue-900/20 rounded-full px-4 py-1 transition-all active:scale-90">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Dashboard</span>
</div>
<!-- Optimizer -->
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all active:scale-90">
<span class="material-symbols-outlined">auto_fix_high</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Optimizer</span>
</div>
<!-- History -->
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all active:scale-90">
<span class="material-symbols-outlined">history</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">History</span>
</div>
<!-- Account -->
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all active:scale-90">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Account</span>
</div>
</nav>
</body></html>
